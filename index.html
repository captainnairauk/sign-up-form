<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up</title>
</head>

<body>
    <div class="container">
        <div class="left-container">
            <img src="./green-leaf.jpg" alt="a giant green leaf image" width="200" height="500">
            <footer>Photo by <a href="">Halie West</a> on <a href="">Unsplash</a></footer>
        </div>
        <div class="right-container">
            <div class="card-1">
                <p>
                    This is not a real online service! You know you need something like this in your life to help you
                    realize your deepest dreams. Sign up <em>now</em> to get started.
                </p>
                <p>
                    You know you want to!
                </p>
            </div>

            <div class="card-2">
                <h3>Let's do this!</h3>
                <form action="" method="get">
                    <label for="firstName">FIRST NAME</label>
                    <input type="text" name="firstName" id="firstName" placeholder="John.." required>
                    <label for="lastName">LAST NAME</label>
                    <input type="text" name="lastName" id="lastName" placeholder="Doe.." required>
                    <label for="email">EMAIL</label>
                    <input type="email" name="email" id="email" placeholder="xyz@email.com" required>
                    <label for="phoneNumber">PHONE NUMBER</label>
                    <input type="tel" name="phoneNumber" id="phoneNumber" minlength="8"required>
                    <label for="password">PASSWORD</label>
                    <input type="password" name="password" id="password" required>
                    <label for="confirmPassword">CONFIRM PASSWORD</label>
                    <input type="password" name="confirmPassword" id="confirmPassword" required>

                </form>
            </div>
            <div class="card-3">
                <button>Create Account</button>
                <div>Already have an account? <a href="http://">Log in</a></div>
            </div>
        </div>

    </div>
</body>

</html>
