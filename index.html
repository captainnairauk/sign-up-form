<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="left-container">
            <img src="./green-leaf.jpg" alt="a giant green leaf image" class="green-leaf">
            <div class="odin-logo-container">
                <div class="odin-logo">
                    <img src="./odin-lined.png" alt="odin symbol" >
                </div>
                <div class="odin-text">
                    AK
                </div>
            </div>
        </div>
        <div class="right-container">
            <div class="card-1">
                <p>
                    <strong>
                        This is not a real online service! You know you need something like this in your life to help
                        you realize your deepest dreams.
                        <br>
                        Sign up <em>now</em> to get started.
                    </strong>
                </p>
                <p>
                    <strong>
                        You know you want to!
                    </strong>
                </p>
            </div>

            <div class="card-2">
                <h3>Let's do this!</h3>
                <form action="" method="get">
                    <div class="form-container">
                        <div class="left-form-container">
                            <label for="firstName">FIRST NAME</label>
                            <input type="text" name="firstName" id="firstName" placeholder="John.." required>
                            <label for="email">EMAIL</label>
                            <input type="email" name="email" id="email" placeholder="xyz@email.com" required>
                            <label for="password">PASSWORD</label>
                            <input type="password" name="password" id="password" required>
                        </div>
                        <div class="right-form-container">
                            <label for="lastName">LAST NAME</label>
                            <input type="text" name="lastName" id="lastName" placeholder="Doe.." required>
                            <label for="phoneNumber">PHONE NUMBER</label>
                            <input type="tel" name="phoneNumber" id="phoneNumber" minlength="8" required>
                            <label for="confirmPassword">CONFIRM PASSWORD</label>
                            <input type="password" name="confirmPassword" id="confirmPassword" required>
                        </div>
                    </div>

                </form>
            </div>
            <div class="card-3">
                <button>Create Account</button>
                <div>Already have an account? <a href="http://">Log in</a></div>
            </div>
        </div>

    </div>
</body>

</html>
